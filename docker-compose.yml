version: '3.8'

x-common-env: &common-env
  DATABASE_URL: postgresql://rjcut:rjcut_secret_2024@postgres:5432/rjcut
  REDIS_URL: redis://redis:6379/0
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: rjcut
  MINIO_USE_SSL: "false"
  MINIO_EXTERNAL_ENDPOINT: http://localhost:9003
  TASK_TIMEOUT_SECONDS: "3600"
  TASK_STALE_CHECK_INTERVAL: "60"
  SECRET_KEY: change_me_in_production_2024
  RQ_QUEUE_NAME: rjcut_tasks
  PYTHONUNBUFFERED: "1"

services:
  postgres:
    image: postgres:17
    container_name: rjcut_postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: rjcut
      POSTGRES_USER: rjcut
      POSTGRES_PASSWORD: rjcut_secret_2024
    volumes:
      - /opt/rjcut/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rjcut -d rjcut"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: rjcut_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - /opt/rjcut/redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:latest
    container_name: rjcut_minio
    restart: always
    ports:
      - "9003:9000"      # ← 主机用 9003（避开冲突），容器内 API 还是 9000
      - "9002:9001"      # Console 用主机 9002 访问
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - /opt/minio/data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rjcut_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
    volumes:
      - /opt/rjcut/service_data:/app/service_data
      - /root/workspaces/rjcut:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: bash -c "python scripts/init_db.py && uvicorn api_service:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: rjcut_worker
    restart: always
    environment:
      <<: *common-env
    volumes:
      - /opt/rjcut/service_data:/app/service_data
      - /root/workspaces/rjcut:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: python worker.py

  task_watchdog:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rjcut_watchdog
    restart: always
    environment:
      <<: *common-env
    volumes:
      - /root/workspaces/rjcut:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python task_watchdog.py